# Config-as-code when Railway service root directory is `backend`.
# If Railway doesn’t pick this up, set custom config path to `/backend/railway.toml`.
# https://docs.railway.com/deploy/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = ["alembic upgrade head"]
# Omit startCommand: Railway invokes it without a shell, so `$PORT` is not expanded.
# `Dockerfile` CMD uses `sh -c '... ${PORT:-8000}'` instead.
